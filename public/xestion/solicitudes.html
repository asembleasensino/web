<!doctype html>
<html lang="gl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solicitudes · AAEP</title>
    <style>
      :root { font-family: Inter, Arial, sans-serif; color: #252321; background: #f2f0ec; }
      body { margin: 0; padding: 2rem; }
      main { max-width: 1100px; margin: auto; }
      header { display: flex; justify-content: space-between; gap: 2rem; align-items: end; border-bottom: 2px solid; padding-bottom: 1rem; }
      h1 { margin: 0; font-size: clamp(3rem, 9vw, 7rem); line-height: .85; text-transform: uppercase; letter-spacing: -.05em; }
      a { color: inherit; font-weight: 700; }
      article { display: grid; grid-template-columns: 11rem 1fr; gap: 2rem; border-bottom: 1px solid #25232144; padding: 1.5rem 0; }
      small { color: #25232199; }
      h2 { margin: 0 0 .4rem; }
      p { line-height: 1.5; }
      .error { padding: 1rem; background: #c94a42; color: #f2f0ec; }
      .actions { display: flex; flex-wrap: wrap; gap: .5rem; }
      button { border: 1px solid; background: transparent; padding: .55rem .75rem; font: inherit; font-weight: 700; cursor: pointer; }
      @media (max-width: 650px) { body { padding: 1rem; } article { grid-template-columns: 1fr; gap: .5rem; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Solicitudes</h1>
        <a href="/admin/#/collections/configuracion/entries/asembleas">Xestionar asembleas →</a>
      </header>
      <div id="list"><p>Cargando solicitudes…</p></div>
    </main>
    <script>
      const escapeHtml = (value = "") => String(value).replace(/[&<>"']/g, (character) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[character]);
      fetch("/api/solicitudes")
        .then((response) => {
          if (!response.ok) throw new Error("Acceso non autorizado");
          return response.json();
        })
        .then(({ solicitudes }) => {
          const list = document.querySelector("#list");
          if (!solicitudes.length) {
            list.innerHTML = "<p>Non hai solicitudes pendentes.</p>";
            return;
          }
          list.innerHTML = solicitudes.map((item) => `
            <article>
              <div><small>${new Date(item.createdAt).toLocaleString("gl")}</small><p><strong>${item.estado}</strong></p></div>
              <div>
                <h2>${escapeHtml(item.centro)}</h2>
                <small>Código ${escapeHtml(item.centroCodigo)}</small>
                <p>${escapeHtml(item.nome)} · <a href="mailto:${encodeURIComponent(item.email)}">${escapeHtml(item.email)}</a></p>
                ${item.mensaxe ? `<p>${escapeHtml(item.mensaxe)}</p>` : ""}
                <div class="actions">
                  <button data-id="${escapeHtml(item.id)}" data-state="en_contacto">Marcar en contacto</button>
                  <button data-id="${escapeHtml(item.id)}" data-state="resolta">Marcar resolta</button>
                  <button data-id="${escapeHtml(item.id)}" data-state="arquivada">Arquivar</button>
                </div>
              </div>
            </article>
          `).join("");
        })
        .catch((error) => {
          document.querySelector("#list").innerHTML = `<p class="error">${error.message}. Esta páxina debe estar protexida con Cloudflare Access.</p>`;
        });
      document.querySelector("#list").addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-id]");
        if (!button) return;
        button.disabled = true;
        const response = await fetch("/api/solicitudes", {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id: button.dataset.id, estado: button.dataset.state }),
        });
        if (response.ok) location.reload();
        else {
          button.disabled = false;
          alert("Non foi posible actualizar a solicitude.");
        }
      });
    </script>
  </body>
</html>
