version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      cloudflare:
        patterns:
          - "@cloudflare/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
